# === TRIANGULATION RECORD ===
# Task: GitHub Actions CI pipeline for monorepo (Python + Next.js)
# Approach: Path-filtered jobs — only run what changed
#
# Vertex 1 (Academic):
#   Source: Burkov, A. (2020). "Machine Learning Engineering", Ch.11. True Positive Inc.
#   Finding: CI/CD must validate code, tests, and model reproducibility on every commit
#   Relevance: Our pipeline tests both API and frontend with coverage gates
#
# Vertex 2 (Industry):
#   Source: https://dev.to/pockit_tools/github-actions-in-2026-the-complete-guide-to-monorepo-cicd
#   Pattern: Path filters, matrix strategy, caching, parallel jobs
#   Adaptation: Two parallel jobs (backend + frontend) with shared cache
#
# Vertex 3 (Internal):
#   Files checked: requirements-api.txt, frontend/package.json, tests/conftest.py
#   Consistency: Confirmed — pytest for Python, vitest for TS, both have configs
#
# Verdict: PROCEED
# =============================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Detect what changed ----------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'api/**'
              - 'app_core/**'
              - 'tests/**'
              - 'requirements*.txt'
            frontend:
              - 'frontend/**'

  # ---------- Backend (Python) ----------
  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-api.txt

      - name: Ruff lint
        run: ruff check api/ app_core/ tests/

      - name: Ruff format check
        run: ruff format --check api/ app_core/ tests/

      - name: Mypy type check
        run: mypy --ignore-missing-imports --no-strict-optional api/

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder-key
        run: |
          pytest tests/ -v \
            --cov=api --cov=app_core \
            --cov-report=term-missing \
            --cov-report=xml:coverage-backend.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage-backend.xml

  # ---------- Frontend (Next.js) ----------
  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest unit tests
        run: npx vitest run --coverage --reporter=verbose
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ---------- E2E Tests (Playwright) ----------
  e2e:
    needs: [backend, frontend]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
