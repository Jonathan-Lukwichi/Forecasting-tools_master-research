# Render deployment configuration for HealthForecast AI API
# Docs: https://docs.render.com/blueprint-spec

services:
  - type: web
    name: healthforecast-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      # Add these manually in the Render dashboard:
      # - key: SUPABASE_URL
      #   sync: false
      # - key: SUPABASE_KEY
      #   sync: false
