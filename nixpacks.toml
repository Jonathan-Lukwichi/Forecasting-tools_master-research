# Tell Nixpacks to use our lightweight requirements file
# instead of the default requirements.txt (which has TensorFlow = 2GB+)

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements-deploy.txt"]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
